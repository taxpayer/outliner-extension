<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #1e3a8a;
      --bg: #0f172a;
      --text: #f8fafc;
      --border: rgba(255,255,255,0.1);
    }
    body {
      width: 280px;
      padding: 16px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 18px; margin: 0; font-weight: 700; }
    
    .status-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      text-align: center;
    }
    .domain { 
      font-size: 12px; 
      color: #94a3b8; 
      word-break: break-all;
      margin-top: 4px;
    }

    button {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%);
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
    .btn-secondary.active {
      border-color: #22c55e;
      color: #4ade80;
    }

    .footer {
      font-size: 11px;
      color: #64748b;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/outline-logo.png" alt="Logo">
    <h1>Outliner</h1>
  </div>

  <div class="status-card">
    <div id="status-text">...</div>
    <div id="current-domain" class="domain">...</div>
  </div>

  <button id="btn-unbrick" class="btn-primary">
    <span>🔓</span> <span id="unbrick-text">...</span>
  </button>

  <button id="btn-auto" class="btn-secondary">
    <span id="auto-icon">⚙️</span> <span id="auto-text">...</span>
  </button>

  <div id="footer-text" class="footer">
    ...
  </div>

  <script src="popup.js"></script>
</body>
</html>
